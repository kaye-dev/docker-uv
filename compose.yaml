services:
  uv:
    image: ghcr.io/astral-sh/uv:python3.12-trixie-slim
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /workspace
    environment:
      HOME: /tmp/uv-home
      PATH: /var/uv-tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      UV_CACHE_DIR: /var/uv-cache
      UV_LINK_MODE: copy
      UV_TOOL_BIN_DIR: /var/uv-tools/bin
      UV_TOOL_DIR: /var/uv-tools/tools
    volumes:
      - type: bind
        source: ${WORKSPACE_DIR:-.}
        target: /workspace
      - type: bind
        source: ./.docker/uv-cache
        target: /var/uv-cache
      - type: bind
        source: ./.docker/uv-tools
        target: /var/uv-tools
    stdin_open: true
    tty: true
